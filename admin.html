<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Admin Panel</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 30px; text-align: center; }
        .box { background: white; padding: 30px; border-radius: 10px; max-width: 500px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: left;}
        h2 { color: #0A1128; border-bottom: 2px solid #FFD700; padding-bottom: 10px; margin-bottom: 20px;}
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #333;}
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background: #0A1128; color: #FFD700; padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; margin-top: 10px; }
        button:hover { background: #111D4A; }
        .btn-danger { background: #e74c3c; color: white; margin-top: 15px; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #0A1128; font-weight: bold;}
        
        #login-screen { display: none; }
        #admin-panel { display: none; }
    </style>
</head>
<body>

    <div class="box" id="login-screen" style="text-align: center;">
        <h2>Admin Login required</h2>
        <div class="form-group"><input type="text" id="l-user" placeholder="Username (kgf292900)"></div>
        <div class="form-group"><input type="password" id="l-pass" placeholder="Password (kgf292900)"></div>
        <button onclick="login()">Login</button>
        <a href="index.html" class="back-link">Return to Store</a>
    </div>

    <div class="box" id="admin-panel">
        <h2>Edit Product Slot</h2>
        
        <div class="form-group">
            <label>Select Box / Slot to Edit</label>
            <select id="slot-select" onchange="loadSlotData()"></select>
        </div>
        
        <div class="form-group">
            <label>Status</label>
            <select id="p-status">
                <option value="true">In Stock (Active Product)</option>
                <option value="false">Out of Stock (Empty Box)</option>
            </select>
        </div>

        <div class="form-group">
            <label>Product Name</label>
            <input type="text" id="p-name">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea id="p-desc" rows="2"></textarea>
        </div>
        <div class="form-group">
            <label>Old Price (Line-cut)</label>
            <input type="number" id="p-oldprice">
        </div>
        <div class="form-group">
            <label>New Price (Discounted)</label>
            <input type="number" id="p-price">
        </div>
        <div class="form-group">
            <label>Image File Name</label>
            <input type="text" id="p-img" placeholder="e.g. product2.png">
        </div>
        
        <button onclick="saveSlot()">Save Changes</button>
        <a href="index.html" class="back-link">🔙 Go Back to Live Store</a>
    </div>

    <script>
        let gridData = JSON.parse(localStorage.getItem("store_grid"));

        function checkAuth() {
            if(sessionStorage.getItem("isAdmin") === "true") {
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("admin-panel").style.display = "block";
                initEditor();
            } else {
                document.getElementById("login-screen").style.display = "block";
                document.getElementById("admin-panel").style.display = "none";
            }
        }

        function login() {
            let u = document.getElementById("l-user").value;
            let p = document.getElementById("l-pass").value;
            if(u === "kgf292900" && p === "kgf292900") {
                sessionStorage.setItem("isAdmin", "true");
                checkAuth();
            } else {
                alert("Invalid Username or Password!");
            }
        }

        function initEditor() {
            let selectHtml = "";
            gridData.forEach(p => {
                let badge = p.special ? ` [${p.special}]` : "";
                selectHtml += `<option value="${p.id}">Box ${p.id} - ${p.name} ${badge}</option>`;
            });
            document.getElementById("slot-select").innerHTML = selectHtml;

            // Check URL for specific slot
            let urlParams = new URLSearchParams(window.location.search);
            let slotId = urlParams.get('slot');
            if(slotId) {
                document.getElementById("slot-select").value = slotId;
            }
            loadSlotData();
        }

        function loadSlotData() {
            let id = parseInt(document.getElementById("slot-select").value);
            let p = gridData.find(x => x.id === id);
            if(p) {
                document.getElementById("p-status").value = p.isActive.toString();
                document.getElementById("p-name").value = p.name;
                document.getElementById("p-desc").value = p.desc;
                document.getElementById("p-oldprice").value = p.oldPrice;
                document.getElementById("p-price").value = p.price;
                document.getElementById("p-img").value = p.img;
            }
        }

        function saveSlot() {
            let id = parseInt(document.getElementById("slot-select").value);
            let index = gridData.findIndex(x => x.id === id);
            
            gridData[index].isActive = document.getElementById("p-status").value === "true";
            gridData[index].name = document.getElementById("p-name").value;
            gridData[index].desc = document.getElementById("p-desc").value;
            gridData[index].oldPrice = document.getElementById("p-oldprice").value;
            gridData[index].price = document.getElementById("p-price").value;
            gridData[index].img = document.getElementById("p-img").value;

            localStorage.setItem("store_grid", JSON.stringify(gridData));
            alert("Changes Saved Successfully!");
        }

        window.onload = checkAuth;
    </script>
</body>
</html>
