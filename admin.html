<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Admin Panel</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 30px; }
        .admin-container { background: white; padding: 30px; border-radius: 10px; max-width: 600px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #0A1128; border-bottom: 2px solid #FFD700; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #0A1128; color: #FFD700; padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; margin-top: 10px; }
        button:hover { background: #111D4A; }
        .product-list-item { background: #e9ecef; padding: 15px; margin-top: 15px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .del-btn { background: red; color: white; padding: 5px 10px; border: none; cursor: pointer; width: auto; margin-top:0; }
    </style>
</head>
<body>

    <div class="admin-container">
        <h2>Add New Product</h2>
        <div class="form-group">
            <label>Product Name</label>
            <input type="text" id="p-name" placeholder="e.g. Scented Candles">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea id="p-desc" rows="2" placeholder="Product details..."></textarea>
        </div>
        <div class="form-group">
            <label>Old Price (Line-cut)</label>
            <input type="number" id="p-oldprice">
        </div>
        <div class="form-group">
            <label>New Price (Discounted)</label>
            <input type="number" id="p-price">
        </div>
        <button onclick="addProduct()">Save Product to Store</button>

        <h2 style="margin-top: 40px;">Current Products</h2>
        <div id="admin-product-list"></div>
        <br>
        <button onclick="resetToDefault()" style="background: #ccc; color: black;">Reset to Default Products</button>
        <br><br>
        <a href="index.html" style="display:block; text-align:center; color: #0A1128;">Go Back to Live Store</a>
    </div>

    <script>
        let products = JSON.parse(localStorage.getItem("store_items")) || [];

        function renderAdminProducts() {
            let html = "";
            products.forEach((p, index) => {
                html += `
                <div class="product-list-item">
                    <div>
                        <strong>${p.name}</strong><br>
                        Price: Rs. ${p.price}
                    </div>
                    <button class="del-btn" onclick="deleteProduct(${index})">Delete</button>
                </div>`;
            });
            document.getElementById("admin-product-list").innerHTML = html;
        }

        function addProduct() {
            let name = document.getElementById("p-name").value;
            let desc = document.getElementById("p-desc").value;
            let oldprice = document.getElementById("p-oldprice").value;
            let price = document.getElementById("p-price").value;

            if(!name || !price) { alert("Please enter Name and New Price!"); return; }

            products.push({
                id: Date.now(),
                name: name,
                desc: desc,
                oldPrice: oldprice,
                price: price,
                img: "[New Image]",
                reviews: [{name: "New Customer", rating: "★★★★★", text: "Great product!"}]
            });

            localStorage.setItem("store_items", JSON.stringify(products));
            alert("Product Added!");
            renderAdminProducts();
        }

        function deleteProduct(index) {
            products.splice(index, 1);
            localStorage.setItem("store_items", JSON.stringify(products));
            renderAdminProducts();
        }

        function resetToDefault() {
            localStorage.removeItem("store_items");
            alert("Products reset. Go to Store to see defaults.");
            location.reload();
        }

        window.onload = renderAdminProducts;
    </script>
</body>
</html>
