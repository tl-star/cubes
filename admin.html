<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin · Orders</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0ebe5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .admin-card {
            max-width: 700px;
            width: 100%;
            background: #fff;
            border-radius: 30px;
            padding: 40px 35px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.08);
            border: 1px solid #e8dfd6;
        }
        h1 { font-size: 2rem; font-weight: 600; color: #1f1713; }
        .sub { color: #7a685a; margin: 6px 0 20px 0; }
        .orders-section { margin-top: 10px; }
        .order-item {
            background: #fcf9f5;
            border: 1px solid #e8dfd6;
            border-radius: 14px;
            padding: 14px;
            margin: 8px 0;
            font-size: 0.9rem;
        }
        .order-item strong { color: #1f1713; }
        .clear-btn {
            background: #d9534f;
            color: #fff;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 10px;
        }
        .clear-btn:hover { background: #c9302c; }
        .back-link { display: block; text-align: center; margin-top: 18px; color: #7a685a; text-decoration: none; }
        .back-link:hover { color: #2e241f; }
        .btn-secondary {
            background: #ece3d9;
            color: #3f342c;
            border: none;
            padding: 12px 20px;
            border-radius: 60px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
            text-align: center;
            display: inline-block;
            text-decoration: none;
        }
        .btn-secondary:hover { background: #ddd0c4; }
    </style>
</head>
<body>
    <div class="admin-card">
        <h1><i class="fas fa-box" style="color:#7a5f4a;"></i> Orders</h1>
        <p class="sub">View all customer orders</p>

        <div class="orders-section">
            <div id="ordersList"></div>
            <button class="clear-btn" onclick="clearOrders()"><i class="fas fa-trash"></i> Clear All Orders</button>
            <a href="index.html" class="btn-secondary"><i class="fas fa-arrow-left"></i> Back to Store</a>
        </div>
    </div>

    <script>
        function renderOrders() {
            const orders = JSON.parse(localStorage.getItem('orders') || '[]');
            const container = document.getElementById('ordersList');
            if (orders.length === 0) {
                container.innerHTML = '<p style="color:#9b8a7b;text-align:center;padding:20px;">No orders yet.</p>';
                return;
            }
            container.innerHTML = orders.map((o, i) => `
                <div class="order-item">
                    <strong>#${i+1}</strong> ${o.product} · ${o.price}<br>
                    <span style="font-size:0.8rem;color:#7a685a;">
                        👤 ${o.customer.name} · 📱 ${o.customer.phone}<br>
                        🏠 ${o.customer.address}<br>
                        ${o.customer.location ? '📍 ' + o.customer.location : ''}
                    </span>
                    <br><span style="font-size:0.75rem;background:#ece3d9;padding:2px 12px;border-radius:40px;display:inline-block;margin-top:4px;">${o.payment === 'cod' ? '📦 COD' : '💳 Online'}</span>
                    <span style="font-size:0.7rem;color:#9b8a7b;float:right;">${new Date(o.timestamp).toLocaleString()}</span>
                </div>
            `).join('');
        }

        function clearOrders() {
            if (confirm('Delete all orders?')) {
                localStorage.removeItem('orders');
                renderOrders();
            }
        }

        renderOrders();
    </script>
</body>
</html>
