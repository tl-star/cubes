<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scented Briquette | Official Store</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@400;600;700&family=Amiri:wght@400;700&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --bg-dark: #0A1128; --gold: #FFD700; --text-light: #ffffff; --green: #25D366; --danger: #e74c3c; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-dark); color: var(--text-light); text-align: center; overflow-x: hidden; }

        /* Header */
        header { background: #ffffff; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 100; border-bottom: 3px solid var(--gold); flex-wrap: wrap; }
        .logo-container { display: flex; align-items: center; gap: 10px; }
        .logo-img { max-height: 50px; width: auto; border-radius: 8px; box-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        .logo-text { color: #0A1128; font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; letter-spacing: 1px; }
        .header-actions { display: flex; gap: 15px; align-items: center; margin-top: 5px; }
        .lang-select { padding: 6px 10px; border-radius: 5px; border: 1px solid var(--gold); background: #0A1128; color: var(--gold); font-weight: 600; cursor: pointer; font-size: 14px; }
        
        /* Cart Icon */
        .cart-icon-container { position: relative; cursor: pointer; font-size: 24px; color: #0A1128; display: flex; align-items: center; }
        .cart-badge { position: absolute; top: -8px; right: -10px; background: var(--danger); color: white; font-size: 12px; font-weight: bold; padding: 2px 6px; border-radius: 50%; }

        /* Banner */
        .store-banner { padding: 60px 20px; border-bottom: 2px solid var(--gold); background: linear-gradient(to bottom, #111D4A, #0A1128); }
        .store-banner h1 { font-family: 'Playfair Display', serif; font-size: 40px; color: var(--gold); text-shadow: 2px 2px 5px rgba(0,0,0,0.8); margin-bottom: 15px; }
        .store-banner p { font-size: 16px; color: #E0E0E0; max-width: 700px; margin: 0 auto 25px auto; line-height: 1.6; }
        .hero-contact-btn { background: var(--green); color: white; padding: 12px 30px; font-size: 18px; font-weight: bold; border: none; border-radius: 30px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4); text-decoration: none; display: inline-block; }
        .hero-contact-btn:hover { background: #1ebe57; transform: translateY(-3px); }

        /* Products Grid */
        .container { max-width: 1200px; margin: 50px auto; padding: 0 5%; text-align: left; }
        .section-title { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--gold); border-bottom: 3px solid var(--gold); display: inline-block; padding-bottom: 10px; margin-bottom: 30px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 30px; }
        
        /* Product Card / Slot */
        .product-card { background: #111D4A; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,215,0,0.3); box-shadow: 0 5px 20px rgba(0,0,0,0.5); text-align: center; display: flex; flex-direction: column; position: relative; }
        .img-area { width: 100%; height: 200px; background: #1C2B59; display: flex; align-items: center; justify-content: center; color: #A0AABF; cursor: pointer;}
        .img-area img { width: 100%; height: 100%; object-fit: cover; }
        .product-info { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; }
        .product-title { font-size: 18px; font-weight: 700; color: var(--gold); margin-bottom: 10px; }
        .product-desc { font-size: 13px; color: #FFFFFF; margin-bottom: 15px; line-height: 1.4; flex-grow: 1; }
        .pricing { margin-bottom: 15px; }
        .pricing del { color: #A0AABF; font-size: 14px; margin-right: 8px; }
        .pricing .new-price { color: var(--gold); font-size: 22px; font-weight: 700; }
        .add-cart-btn { background: var(--gold); color: #0A1128; border: none; padding: 10px; width: 100%; font-weight: bold; font-size: 15px; border-radius: 6px; cursor: pointer; transition: 0.2s; margin-bottom: 10px; }
        
        /* Reviews Section inside Product Card */
        .reviews-section { background: rgba(0,0,0,0.2); padding: 12px; margin-top: 15px; border-radius: 8px; text-align: left; }
        .stars { color: var(--gold); font-size: 14px; margin-bottom: 4px; }
        .review-text { font-size: 12px; color: #E0E0E0; font-style: italic; }

        /* Tags for Special Deals */
        .special-tag { position: absolute; top: 10px; left: 10px; background: var(--danger); color: white; padding: 4px 10px; font-size: 12px; font-weight: bold; border-radius: 4px; z-index: 10; text-transform: uppercase;}
        
        /* Empty / Coming Soon Box Style */
        .coming-soon-content { color: var(--gold); opacity: 0.7; }
        .coming-soon-content h3 { font-size: 24px; margin-bottom: 10px; }
        .coming-soon-content p { font-size: 14px; }
        .admin-edit-btn { background: rgba(255,255,255,0.1); border: 1px solid var(--gold); color: var(--gold); padding: 5px 10px; font-size: 12px; border-radius: 4px; cursor: pointer; margin-top: 15px; display: inline-block; }

        /* Login Modal for Admin Access */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; justify-content: center; align-items: center; padding: 10px; }
        .login-box { background: #ffffff; color: #000; padding: 30px; border-radius: 12px; width: 100%; max-width: 350px; text-align: left; position: relative; }
        .login-box h3 { color: #0A1128; margin-bottom: 20px; font-family: 'Playfair Display', serif; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 28px; cursor: pointer; color: #333; font-weight: bold; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #333; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        .login-submit-btn { width: 100%; background: #0A1128; color: var(--gold); border: none; padding: 12px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; }

        /* Cart Overlay (Sidebar) */
        .cart-sidebar { display: none; position: fixed; top: 0; right: 0; width: 100%; max-width: 400px; height: 100%; background: #fff; color: #333; padding: 20px; box-shadow: -5px 0 15px rgba(0,0,0,0.2); z-index: 1000; flex-direction: column; }
        .cart-header { display: flex; justify-content: space-between; border-bottom: 2px solid var(--gold); padding-bottom: 15px; margin-bottom: 20px; }
        .cart-items-container { flex-grow: 1; overflow-y: auto; margin-bottom: 20px; }
        .cart-item { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 10px 0; }
        .submit-order-btn { width: 100%; background: var(--green); color: white; padding: 15px; font-size: 16px; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="cub1.png" alt="Scented Briquette Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/60?text=LOGO'">
            <div class="logo-text">SCENTED BRIQUETTE</div>
        </div>
        <div class="header-actions">
            <select class="lang-select" id="langSwitcher" onchange="changeLanguage()">
                <option value="en">English</option>
                <option value="ur">Urdu (اردو)</option>
            </select>
            <div class="cart-icon-container" onclick="openCart()">
                🛒 <span style="font-size: 16px; font-weight: bold; margin-left: 5px;">Cart</span>
                <div class="cart-badge" id="cart-count">0</div>
            </div>
        </div>
    </header>

    <div class="store-banner">
        <h1 id="banner-title">Heritage Fragrance Collection</h1>
        <p id="banner-desc">Explore the world's most unique scents. Safe for health standards, and repels mosquitoes.</p>
        <a href="https://wa.me/923162260608" class="hero-contact-btn" target="_blank">📞 Contact on WhatsApp</a>
    </div>

    <div class="container">
        <div class="section-title">Our Premium Products</div>
        <div class="product-grid" id="product-list">
            </div>
    </div>

    <div class="modal-overlay" id="loginModal">
        <div class="login-box">
            <span class="close-btn" onclick="closeLogin()">&times;</span>
            <h3>Admin Access Required</h3>
            <p style="font-size: 12px; color: #666; margin-bottom: 15px;">Login to edit Slot <span id="editing-slot-num"></span></p>
            <div class="form-group">
                <label>User ID</label>
                <input type="text" id="admin-user" placeholder="Enter User ID">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="admin-pass" placeholder="Enter Password">
            </div>
            <button class="login-submit-btn" onclick="verifyAdmin()">Login & Edit</button>
        </div>
    </div>

    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h2>Your Cart</h2>
            <span class="close-btn" style="position:static;" onclick="closeCart()">&times;</span>
        </div>
        <div class="cart-items-container" id="cart-items-list"></div>
        <div style="border-top: 2px solid #eee; padding-top: 15px; margin-bottom: 15px; font-weight: bold; font-size: 18px; display:flex; justify-content:space-between;">
            <span>Total:</span> <span>Rs. <span id="cart-total-amount">0</span></span>
        </div>
        
        <div style="background: #f9f9f9; padding: 15px; border-radius: 8px; border: 1px solid #ddd; text-align: left;">
            <h4 style="margin-bottom: 10px;">Delivery Details</h4>
            <div class="form-group"><input type="text" id="cust-name" placeholder="Full Name" required></div>
            <div class="form-group"><input type="tel" id="cust-phone" placeholder="WhatsApp Number" required></div>
            <div class="form-group"><textarea id="cust-address" rows="2" placeholder="Complete Address" required></textarea></div>
            <button class="submit-order-btn" onclick="checkoutOrder()">Send Order via WhatsApp</button>
        </div>
    </div>

    <script>
        const TOTAL_SLOTS = 10;
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        let editingSlotId = null;

        // Base 10 Slots setup (Default data if nothing is saved)
        let defaultSlots = [
            { id: 1, type: 'product', name: "Scented Briquette Box", desc: "Oud, Musk, Motia, Loban. 100% Safe.", oldPrice: 1500, price: 1000, img: "" },
            { id: 2, type: 'product', name: "Electrical Warmer", desc: "Premium burner for smoke-free aroma.", oldPrice: 3000, price: 2000, img: "" },
            { id: 3, type: 'empty', tag: 'Crazy Deal' },
            { id: 4, type: 'empty', tag: 'Gift Pack' },
            { id: 5, type: 'empty' }, { id: 6, type: 'empty' },
            { id: 7, type: 'empty' }, { id: 8, type: 'empty' },
            { id: 9, type: 'empty' }, { id: 10, type: 'empty' }
        ];

        function renderGrid() {
            // Load slots from LocalStorage or use defaults
            let savedData = JSON.parse(localStorage.getItem("store_slots"));
            let slots = (savedData && savedData.length === TOTAL_SLOTS) ? savedData : defaultSlots;
            
            let html = "";
            slots.forEach((slot, index) => {
                let tagHtml = slot.tag ? `<div class="special-tag">${slot.tag}</div>` : '';
                
                if (slot.type === 'product') {
                    // Render Active Product
                    let imgHtml = slot.img ? `<img src="${slot.img}" alt="${slot.name}">` : `[Image]`;
                    html += `
                    <div class="product-card">
                        ${tagHtml}
                        <div class="img-area" onclick="openAdminLogin(${slot.id})">${imgHtml}</div>
                        <div class="product-info">
                            <div class="product-title">${slot.name}</div>
                            <div class="product-desc">${slot.desc}</div>
                            <div class="pricing">
                                <del>Rs. ${slot.oldPrice}</del> <span class="new-price">Rs. ${slot.price}</span>
                            </div>
                            <button class="add-cart-btn" onclick="addToCart('${slot.name}', ${slot.price})">🛒 Add to Cart</button>
                            <div class="reviews-section">
                                <div class="stars">★★★★★</div>
                                <div class="review-text">"Best quality product!"</div>
                            </div>
                            <button class="admin-edit-btn" onclick="openAdminLogin(${slot.id})">⚙️ Edit (Admin)</button>
                        </div>
                    </div>`;
                } else {
                    // Render Empty / Coming Soon / Out of Stock Box
                    let statusText = slot.status === 'outofstock' ? 'Out of Stock' : 'Coming Soon';
                    html += `
                    <div class="product-card" style="justify-content: center; background: rgba(17,29,74,0.6); border: 2px dashed rgba(255,215,0,0.5);">
                        ${tagHtml}
                        <div class="coming-soon-content">
                            <h3>${statusText}</h3>
                            <p>Slot #${slot.id}</p>
                            <button class="admin-edit-btn" style="margin-top: 20px;" onclick="openAdminLogin(${slot.id})">🔒 Add Product (Admin)</button>
                        </div>
                    </div>`;
                }
            });
            document.getElementById("product-list").innerHTML = html;
        }

        // Admin Login Flow
        function openAdminLogin(slotId) {
            editingSlotId = slotId;
            document.getElementById("editing-slot-num").innerText = slotId;
            document.getElementById("loginModal").style.display = "flex";
        }
        function closeLogin() { document.getElementById("loginModal").style.display = "none"; }

        function verifyAdmin() {
            let user = document.getElementById("admin-user").value;
            let pass = document.getElementById("admin-pass").value;
            
            if(user === "kgf292900" && pass === "kgf292900") {
                // Save target slot ID in storage so Admin page knows which slot to edit
                sessionStorage.setItem("target_edit_slot", editingSlotId);
                window.location.href = "admin.html"; // Redirect to admin page
            } else {
                alert("Incorrect User ID or Password!");
            }
        }

        // Cart Functions
        function addToCart(name, price) {
            cart.push({ name, price });
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartUI();
            openCart();
        }
        function removeFromCart(index) {
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartUI();
        }
        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            let listHtml = ""; let total = 0;
            cart.forEach((item, index) => {
                total += parseInt(item.price);
                listHtml += `<div class="cart-item">
                    <div><b>${item.name}</b><br><span style="color:#e74c3c; font-size:13px;">Rs. ${item.price}</span></div>
                    <div style="cursor:pointer; color:#999;" onclick="removeFromCart(${index})">🗑️</div>
                </div>`;
            });
            document.getElementById('cart-items-list').innerHTML = listHtml || "<p style='text-align:center; margin-top:20px;'>Cart is empty.</p>";
            document.getElementById('cart-total-amount').innerText = total;
        }
        
        function openCart() { document.getElementById("cartSidebar").style.display = "flex"; }
        function closeCart() { document.getElementById("cartSidebar").style.display = "none"; }

        function checkoutOrder() {
            if(cart.length === 0) { alert("Cart is empty!"); return; }
            let name = document.getElementById("cust-name").value;
            let phone = document.getElementById("cust-phone").value;
            let address = document.getElementById("cust-address").value;
            if(!name || !phone || !address) { alert("Please fill your delivery details."); return; }

            let orderList = ""; let total = 0;
            cart.forEach((item, i) => { orderList += `${i+1}. ${item.name} - Rs. ${item.price}\n`; total += parseInt(item.price); });
            let msg = `*🛍️ NEW E-COMMERCE ORDER*\n\n*Cart Items:*\n${orderList}\n*Grand Total: Rs. ${total}*\n\n*Customer Details:*\nName: ${name}\nPhone: ${phone}\nAddress: ${address}`;
            window.open(`https://wa.me/923162260608?text=${encodeURIComponent(msg)}`, '_blank');
            cart = []; localStorage.setItem('cart', JSON.stringify(cart)); updateCartUI(); closeCart();
        }

        window.onload = () => { renderGrid(); updateCartUI(); };
    </script>
</body>
</html>
