<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scented Briquette | Official Store</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@400;600;700&family=Amiri:wght@400;700&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --bg-dark: #0A1128; 
            --gold: #FFD700; 
            --text-light: #ffffff; 
            --green: #25D366; 
        }

        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-dark); color: var(--text-light); text-align: center; transition: all 0.3s ease; overflow-x: hidden; }

        /* Store Header */
        header { background: #ffffff; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 100; border-bottom: 3px solid var(--gold); flex-wrap: wrap; }
        .logo-container { display: flex; align-items: center; gap: 10px; }
        .logo-img { max-height: 50px; width: auto; border-radius: 8px; box-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        .logo-text { color: #0A1128; font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; letter-spacing: 1px; }
        .header-actions { display: flex; gap: 15px; align-items: center; margin-top: 5px; }
        .lang-select { padding: 6px 10px; border-radius: 5px; border: 1px solid var(--gold); background: #0A1128; color: var(--gold); font-weight: 600; cursor: pointer; font-size: 14px; }

        /* Banner */
        .store-banner { padding: 60px 20px; border-bottom: 2px solid var(--gold); background: linear-gradient(to bottom, #111D4A, #0A1128); }
        .store-banner h1 { font-family: 'Playfair Display', serif; font-size: 40px; color: var(--gold); text-shadow: 2px 2px 5px rgba(0,0,0,0.8); margin-bottom: 15px; }
        .store-banner p { font-size: 16px; color: #E0E0E0; max-width: 700px; margin: 0 auto 25px auto; line-height: 1.6; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); }
        
        /* Main Hero Order Button */
        .hero-order-btn { background: var(--gold); color: #0A1128; padding: 12px 30px; font-size: 18px; font-weight: bold; border: none; border-radius: 30px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4); text-decoration: none; display: inline-block; }
        .hero-order-btn:hover { background: #e6c200; transform: translateY(-3px); }

        /* Products Section */
        .container { max-width: 1200px; margin: 50px auto; padding: 0 5%; text-align: left; }
        .section-title { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--gold); border-bottom: 3px solid var(--gold); display: inline-block; padding-bottom: 10px; margin-bottom: 30px; text-shadow: 2px 2px 5px rgba(0,0,0,0.8); }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
        .product-card { background: #111D4A; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,215,0,0.3); box-shadow: 0 5px 20px rgba(0,0,0,0.5); position: relative; text-align: center; }
        .img-area { width: 100%; height: 220px; background: #1C2B59; display: flex; align-items: center; justify-content: center; color: #A0AABF; }
        .product-info { padding: 20px; }
        .product-title { font-size: 20px; font-weight: 700; color: var(--gold); margin-bottom: 10px; }
        .product-desc { font-size: 14px; color: #FFFFFF; margin-bottom: 15px; line-height: 1.5; }
        .pricing del { color: #A0AABF; font-size: 16px; margin-right: 10px; }
        .pricing .new-price { color: var(--gold); font-size: 24px; font-weight: 700; }

        .buy-now-btn { display: block; width: 100%; padding: 12px; margin-top: 20px; background: var(--green); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; text-decoration: none; box-shadow: 0 4px 15px rgba(37,211,102,0.4); }
        .buy-now-btn:hover { background: #1ebe57; }

        /* Reviews Section inside Product Card */
        .reviews-section { background: rgba(0,0,0,0.2); padding: 12px; margin-top: 15px; border-radius: 8px; text-align: left; }
        .review-item { border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; margin-bottom: 8px; }
        .review-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .stars { color: var(--gold); font-size: 12px; margin-bottom: 4px; }
        .review-text { font-size: 12px; color: #E0E0E0; font-style: italic; }
        .reviewer-name { font-size: 11px; color: #A0AABF; font-weight: bold; margin-top: 4px; }

        /* Floating WhatsApp Button */
        .floating-whatsapp {
            position: fixed; bottom: 20px; right: 20px; background-color: var(--green); color: white;
            border-radius: 50%; width: 60px; height: 60px; display: flex; justify-content: center; align-items: center;
            font-size: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); z-index: 1000; text-decoration: none; transition: transform 0.3s;
        }
        .floating-whatsapp:hover { transform: scale(1.1); }

        /* Custom Order Form Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; justify-content: center; align-items: center; padding: 10px; }
        .order-form-box { background: #ffffff; color: #000; padding: 25px; border-radius: 12px; width: 100%; max-width: 400px; text-align: left; position: relative; direction: ltr; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 28px; cursor: pointer; color: #333; font-weight: bold; }
        .order-form-box h3 { color: #0A1128; margin-bottom: 10px; font-family: 'Playfair Display', serif; font-size: 22px; }
        .order-summary { background: #f0f0f0; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-size: 14px; font-weight: 600; color: #d32f2f; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #333; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-family: 'Montserrat', sans-serif; font-size: 14px; }
        .submit-order-btn { width: 100%; background: var(--green); color: white; border: none; padding: 12px; font-size: 16px; font-weight: 700; border-radius: 8px; cursor: pointer; margin-top: 10px; }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            header { flex-direction: column; text-align: center; gap: 10px; }
            .store-banner h1 { font-size: 30px; }
            .store-banner p { font-size: 14px; }
            .section-title { font-size: 26px; }
            .product-card { max-width: 100%; margin: 0 auto; }
            .floating-whatsapp { width: 50px; height: 50px; font-size: 24px; bottom: 15px; right: 15px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="cub1.png" alt="Scented Briquette Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/60?text=LOGO'">
            <div class="logo-text">SCENTED BRIQUETTE</div>
        </div>
        <div class="header-actions">
            <select class="lang-select" id="langSwitcher" onchange="changeLanguage()">
                <option value="en">English</option>
                <option value="ur">Urdu (اردو)</option>
                <option value="ar">Arabic (العربية)</option>
            </select>
        </div>
    </header>

    <div class="store-banner">
        <h1 id="banner-title">Heritage Fragrance Collection</h1>
        <p id="banner-desc">Explore the world's most unique scents. Safe for health standards, and repels mosquitoes.</p>
        <a href="#product-list" class="hero-order-btn" id="hero-order-btn">Order Now</a>
    </div>

    <div class="container">
        <div class="section-title" id="section-title">Our Premium Products</div>
        <div class="product-grid" id="product-list">
            </div>
    </div>

    <a href="https://wa.me/923162260608" class="floating-whatsapp" target="_blank" title="Contact Us on WhatsApp">
        📞
    </a>

    <div class="modal-overlay" id="orderModal">
        <div class="order-form-box" id="form-box-direction">
            <span class="close-btn" onclick="closeForm()">&times;</span>
            <h3 id="modal-title">Complete Your Order</h3>
            <div class="order-summary" id="modal-summary">Product Name - Rs. 1000</div>
            
            <div class="form-group">
                <label id="label-name">Full Name</label>
                <input type="text" id="cust-name" required>
            </div>
            <div class="form-group">
                <label id="label-phone">WhatsApp Number</label>
                <input type="tel" id="cust-phone" placeholder="03XXXXXXXXX" required>
            </div>
            <div class="form-group">
                <label id="label-address">Complete Delivery Address</label>
                <textarea id="cust-address" rows="3" required></textarea>
            </div>
            
            <button class="submit-order-btn" id="btn-confirm" onclick="sendOrderToWhatsApp()">Confirm & Send Order</button>
        </div>
    </div>

    <script>
        const translations = {
            en: {
                bannerTitle: "Heritage Fragrance Collection",
                bannerDesc: "Explore the world's most unique scents. Safe for health standards, and repels mosquitoes.",
                heroOrderBtn: "Order Now",
                sectionTitle: "Our Premium Products",
                btnText: "🛒 Buy Now (COD)",
                reviewsText: "Customer Reviews:",
                modalTitle: "Complete Your Order",
                labelName: "Full Name",
                labelPhone: "WhatsApp Number",
                labelAddress: "Complete Delivery Address",
                btnConfirm: "Confirm & Send Order"
            },
            ur: {
                bannerTitle: "نایاب خوشبوؤں کا مجموعہ",
                bannerDesc: "دنیا کی بہترین خوشبوئیں۔ حفظان صحت کے اصولوں کے مطابق اور مچھروں سے نجات۔",
                heroOrderBtn: "آرڈر کریں",
                sectionTitle: "ہماری بہترین مصنوعات",
                btnText: "🛒 ابھی آرڈر کریں (COD)",
                reviewsText: "گاہکوں کے تبصرے:",
                modalTitle: "اپنا آرڈر مکمل کریں",
                labelName: "پورا نام",
                labelPhone: "واٹس ایپ نمبر",
                labelAddress: "مکمل ڈیلیوری ایڈریس",
                btnConfirm: "آرڈر بھیجیں"
            },
            ar: {
                bannerTitle: "مجموعة العطور التراثية",
                bannerDesc: "استكشف أرقى العطور في العالم. آمن صحياً، وطارد للبعوض.",
                heroOrderBtn: "اطلب الآن",
                sectionTitle: "منتجاتنا الفاخرة",
                btnText: "🛒 اطلب الآن (COD)",
                reviewsText: "آراء العملاء:",
                modalTitle: "أكمل طلبك",
                labelName: "الاسم الكامل",
                labelPhone: "رقم الواتساب",
                labelAddress: "عنوان التوصيل بالكامل",
                btnConfirm: "تأكيد وإرسال الطلب"
            }
        };

        function changeLanguage() {
            let lang = document.getElementById("langSwitcher").value;
            let t = translations[lang];

            document.getElementById("banner-title").innerText = t.bannerTitle;
            document.getElementById("banner-desc").innerText = t.bannerDesc;
            document.getElementById("hero-order-btn").innerText = t.heroOrderBtn;
            document.getElementById("section-title").innerText = t.sectionTitle;
            document.getElementById("modal-title").innerText = t.modalTitle;
            document.getElementById("label-name").innerText = t.labelName;
            document.getElementById("label-phone").innerText = t.labelPhone;
            document.getElementById("label-address").innerText = t.labelAddress;
            document.getElementById("btn-confirm").innerText = t.btnConfirm;

            let btns = document.getElementsByClassName("btn-text-span");
            for(let i = 0; i < btns.length; i++){ btns[i].innerText = t.btnText; }
            
            let revs = document.getElementsByClassName("rev-text-span");
            for(let i = 0; i < revs.length; i++){ revs[i].innerText = t.reviewsText; }

            if(lang === 'ur' || lang === 'ar') {
                document.body.style.direction = "rtl";
                document.getElementById("form-box-direction").style.direction = "rtl";
                document.body.style.fontFamily = "'Amiri', 'Playfair Display', serif"; 
            } else {
                document.body.style.direction = "ltr";
                document.getElementById("form-box-direction").style.direction = "ltr";
                document.body.style.fontFamily = "'Montserrat', sans-serif";
            }
        }

        let defaultProducts = [
            {
                id: 1, name: "Scented Briquette (12 Pcs Box)", desc: "Oud, Musk, Motia, Loban & Signature Scents. 100% Safe.",
                oldPrice: 1500, price: 1000, img: "[Box Image]",
                reviews: [
                    { name: "Ali Ahmed", rating: "★★★★★", text: "Bohot pyari khushboo hai, poora ghar mehak gaya." },
                    { name: "Sana Tariq", rating: "★★★★★", text: "Machar bhi waqai bhaag gaye, best product!" }
                ]
            },
            {
                id: 2, name: "Electrical Device Warmer", desc: "Premium electrical burner for a consistent, smoke-free aroma.",
                oldPrice: 3000, price: 2000, img: "[Device Image]",
                reviews: [
                    { name: "Usman Khan", rating: "★★★★☆", text: "Quality bohot achi hai aur safe hai use karne mein." }
                ]
            }
        ];

        let selectedProduct = "";
        let selectedPrice = "";

        function loadProducts() {
            let storedProducts = JSON.parse(localStorage.getItem("store_items"));
            let productsToRender = (storedProducts && storedProducts.length > 0) ? storedProducts : defaultProducts;
            let currentLang = document.getElementById("langSwitcher").value;
            let html = "";
            
            productsToRender.forEach(p => {
                let reviewsHtml = "";
                if(p.reviews && p.reviews.length > 0) {
                    p.reviews.forEach(r => {
                        reviewsHtml += `<div class="review-item"><div class="stars">${r.rating}</div><div class="review-text">"${r.text}"</div><div class="reviewer-name">- ${r.name}</div></div>`;
                    });
                } else {
                    reviewsHtml = `<div class="review-text">No reviews yet. Be the first to order!</div>`;
                }

                html += `
                <div class="product-card">
                    <div class="img-area">${p.img}</div>
                    <div class="product-info">
                        <div class="product-title">${p.name}</div>
                        <div class="product-desc">${p.desc}</div>
                        <div class="pricing">
                            <del>Rs. ${p.oldPrice}</del> 
                            <span class="new-price">Rs. ${p.price}</span>
                        </div>
                        <button class="buy-now-btn" onclick="openForm('${p.name}', ${p.price})">
                            <span class="btn-text-span">${translations[currentLang].btnText}</span>
                        </button>
                        
                        <div class="reviews-section">
                            <strong class="rev-text-span" style="color:var(--gold); font-size:14px; margin-bottom:8px; display:block;">${translations[currentLang].reviewsText}</strong>
                            ${reviewsHtml}
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById("product-list").innerHTML = html;
        }

        function openForm(name, price) {
            selectedProduct = name;
            selectedPrice = price;
            document.getElementById("modal-summary").innerText = `${name} - Total: Rs. ${price}`;
            document.getElementById("orderModal").style.display = "flex";
        }

        function closeForm() {
            document.getElementById("orderModal").style.display = "none";
        }

        function sendOrderToWhatsApp() {
            let name = document.getElementById("cust-name").value;
            let phone = document.getElementById("cust-phone").value;
            let address = document.getElementById("cust-address").value;
            
            if(!name || !phone || !address) {
                alert("Please fill all details to complete the order.");
                return;
            }

            let msg = `*NEW COD ORDER* 📦\n\n*Product:* ${selectedProduct}\n*Total Price:* Rs. ${selectedPrice}\n\n*Customer Details:*\n*Name:* ${name}\n*Phone:* ${phone}\n*Address:* ${address}`;
            let whatsappNum = "923162260608";
            window.open(`https://wa.me/${whatsappNum}?text=${encodeURIComponent(msg)}`, '_blank');
            closeForm();
        }

        // Smooth scroll for Order Now button
        document.getElementById('hero-order-btn').addEventListener('click', function(e) {
            e.preventDefault();
            document.querySelector('#product-list').scrollIntoView({ behavior: 'smooth' });
        });

        window.onload = loadProducts;
    </script>
</body>
</html>
