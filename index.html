<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scented Briquette | Official Store</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@400;600;700&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root {
            --bg-dark: #0A1128; /* Thoda aur dark kiya hai taake text ubhar kar aaye */
            --gold: #FFD700; /* Ekdum Bright Gold */
            --text-light: #ffffff; /* Pure White text */
            --green: #25D366; 
        }

        body { font-family: 'Montserrat', sans-serif; background-color: var(--bg-dark); color: var(--text-light); text-align: center; }

        /* Store Header */
        header { background: #ffffff; padding: 15px 50px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 100; border-bottom: 3px solid var(--gold); }
        .logo-container { display: flex; align-items: center; gap: 15px; }
        .logo-img { max-height: 60px; width: auto; border-radius: 8px; box-shadow: 0 0 10px rgba(255, 215, 0, 0.5); }
        .logo-text { color: #0A1128; font-family: 'Playfair Display', serif; font-size: 26px; font-weight: 700; letter-spacing: 1px; }
        .header-actions { display: flex; gap: 15px; align-items: center; }
        .lang-select { padding: 8px; border-radius: 5px; border: 1px solid var(--gold); background: #0A1128; color: var(--gold); font-weight: 600; cursor: pointer; }

        /* Banner */
        .store-banner { padding: 70px 20px; border-bottom: 2px solid var(--gold); background: linear-gradient(to bottom, #111D4A, #0A1128); }
        .store-banner h1 { font-family: 'Playfair Display', serif; font-size: 48px; color: var(--gold); text-shadow: 2px 2px 5px rgba(0,0,0,0.8); margin-bottom: 15px; }
        .store-banner p { font-size: 18px; color: #E0E0E0; max-width: 700px; margin: 0 auto; line-height: 1.6; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); }

        /* Products Section */
        .container { max-width: 1200px; margin: 50px auto; padding: 0 20px; text-align: left; }
        .section-title { font-family: 'Playfair Display', serif; font-size: 36px; color: var(--gold); border-bottom: 3px solid var(--gold); display: inline-block; padding-bottom: 10px; margin-bottom: 40px; text-shadow: 2px 2px 5px rgba(0,0,0,0.8); }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px; }
        .product-card { background: #111D4A; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,215,0,0.3); box-shadow: 0 5px 20px rgba(0,0,0,0.5); position: relative; text-align: center; }
        .img-area { width: 100%; height: 250px; background: #1C2B59; display: flex; align-items: center; justify-content: center; color: #A0AABF; }
        .product-info { padding: 25px; }
        .product-title { font-size: 22px; font-weight: 700; color: var(--gold); margin-bottom: 10px; }
        .product-desc { font-size: 15px; color: #FFFFFF; margin-bottom: 15px; line-height: 1.5; }
        .pricing del { color: #A0AABF; font-size: 18px; margin-right: 10px; }
        .pricing .new-price { color: var(--gold); font-size: 28px; font-weight: 700; }

        .buy-now-btn { display: block; width: 100%; padding: 15px; margin-top: 20px; background: var(--green); color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: 700; cursor: pointer; text-decoration: none; box-shadow: 0 4px 15px rgba(37,211,102,0.4); }
        .buy-now-btn:hover { background: #1ebe57; }

        /* Reviews Section inside Product Card */
        .reviews-section { background: rgba(0,0,0,0.2); padding: 15px; margin-top: 20px; border-radius: 8px; text-align: left; }
        .review-item { border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 10px; }
        .review-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .stars { color: var(--gold); font-size: 14px; margin-bottom: 5px; }
        .review-text { font-size: 13px; color: #E0E0E0; font-style: italic; }
        .reviewer-name { font-size: 12px; color: #A0AABF; font-weight: bold; margin-top: 5px; }

        /* Custom Order Form Modal (Google Form style) */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; justify-content: center; align-items: center; }
        .order-form-box { background: #ffffff; color: #000; padding: 30px; border-radius: 12px; width: 90%; max-width: 400px; text-align: left; position: relative; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 24px; cursor: pointer; color: #333; font-weight: bold; }
        .order-form-box h3 { color: #0A1128; margin-bottom: 10px; font-family: 'Playfair Display', serif; font-size: 24px; }
        .order-summary { background: #f0f0f0; padding: 10px; border-radius: 5px; margin-bottom: 20px; font-size: 14px; font-weight: 600; color: #d32f2f; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 5px; color: #333; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-family: 'Montserrat', sans-serif; }
        .submit-order-btn { width: 100%; background: var(--green); color: white; border: none; padding: 15px; font-size: 18px; font-weight: 700; border-radius: 8px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="cube1.png" alt="Scented Briquette Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/60?text=LOGO'">
            <div class="logo-text">SCENTED BRIQUETTE</div>
        </div>
        <div class="header-actions">
            <select class="lang-select">
                <option value="en">English</option>
                <option value="ur">Urdu</option>
            </select>
        </div>
    </header>

    <div class="store-banner">
        <h1>Heritage Fragrance Collection</h1>
        <p>Explore the world's most unique scents. Safe for health standards, and repels mosquitoes.</p>
    </div>

    <div class="container">
        <div class="section-title">Our Premium Products</div>
        <div class="product-grid" id="product-list">
            </div>
    </div>

    <div class="modal-overlay" id="orderModal">
        <div class="order-form-box">
            <span class="close-btn" onclick="closeForm()">&times;</span>
            <h3>Complete Your Order</h3>
            <div class="order-summary" id="modal-summary">Product Name - Rs. 1000</div>
            
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="cust-name" placeholder="Enter your name" required>
            </div>
            <div class="form-group">
                <label>WhatsApp Number</label>
                <input type="tel" id="cust-phone" placeholder="03XXXXXXXXX" required>
            </div>
            <div class="form-group">
                <label>Complete Delivery Address</label>
                <textarea id="cust-address" rows="3" placeholder="House#, Street, Area, City" required></textarea>
            </div>
            
            <button class="submit-order-btn" onclick="sendOrderToWhatsApp()">Confirm & Send Order</button>
        </div>
    </div>

    <script>
        // Default Products & Reviews (Agar admin ne kuch nahi add kiya)
        let defaultProducts = [
            {
                id: 1,
                name: "Scented Briquette (12 Pcs Box)",
                desc: "Oud, Musk, Motia, Loban & Signature Scents. 100% Safe.",
                oldPrice: 1500,
                price: 1000,
                img: "[Box Image]",
                reviews: [
                    { name: "Ali Ahmed", rating: "★★★★★", text: "Bohot pyari khushboo hai, poora ghar mehak gaya." },
                    { name: "Sana Tariq", rating: "★★★★★", text: "Machar bhi waqai bhaag gaye, best product!" }
                ]
            },
            {
                id: 2,
                name: "Electrical Device Warmer",
                desc: "Premium electrical burner for a consistent, smoke-free aroma.",
                oldPrice: 3000,
                price: 2000,
                img: "[Device Image]",
                reviews: [
                    { name: "Usman Khan", rating: "★★★★☆", text: "Quality bohot achi hai aur safe hai use karne mein." }
                ]
            }
        ];

        let selectedProduct = "";
        let selectedPrice = "";

        // Load Products from Local Storage OR use defaults
        function loadProducts() {
            let storedProducts = JSON.parse(localStorage.getItem("store_items"));
            let productsToRender = (storedProducts && storedProducts.length > 0) ? storedProducts : defaultProducts;
            
            let html = "";
            productsToRender.forEach(p => {
                // Generate Reviews HTML
                let reviewsHtml = "";
                if(p.reviews && p.reviews.length > 0) {
                    p.reviews.forEach(r => {
                        reviewsHtml += `<div class="review-item"><div class="stars">${r.rating}</div><div class="review-text">"${r.text}"</div><div class="reviewer-name">- ${r.name}</div></div>`;
                    });
                } else {
                    reviewsHtml = `<div class="review-text">No reviews yet. Be the first to order!</div>`;
                }

                html += `
                <div class="product-card">
                    <div class="img-area">${p.img}</div>
                    <div class="product-info">
                        <div class="product-title">${p.name}</div>
                        <div class="product-desc">${p.desc}</div>
                        <div class="pricing">
                            <del>Rs. ${p.oldPrice}</del> 
                            <span class="new-price">Rs. ${p.price}</span>
                        </div>
                        <button class="buy-now-btn" onclick="openForm('${p.name}', ${p.price})">🛒 Buy Now (COD)</button>
                        
                        <div class="reviews-section">
                            <strong style="color:var(--gold); font-size:14px; margin-bottom:8px; display:block;">Customer Reviews:</strong>
                            ${reviewsHtml}
                        </div>
                    </div>
                </div>`;
            });
            document.getElementById("product-list").innerHTML = html;
        }

        // Form Logic
        function openForm(name, price) {
            selectedProduct = name;
            selectedPrice = price;
            document.getElementById("modal-summary").innerText = `${name} - Total: Rs. ${price}`;
            document.getElementById("orderModal").style.display = "flex";
        }

        function closeForm() {
            document.getElementById("orderModal").style.display = "none";
        }

        function sendOrderToWhatsApp() {
            let name = document.getElementById("cust-name").value;
            let phone = document.getElementById("cust-phone").value;
            let address = document.getElementById("cust-address").value;
            
            if(!name || !phone || !address) {
                alert("Please fill all details to complete the order.");
                return;
            }

            let msg = `*NEW COD ORDER* 📦\n\n*Product:* ${selectedProduct}\n*Total Price:* Rs. ${selectedPrice}\n\n*Customer Details:*\n*Name:* ${name}\n*Phone:* ${phone}\n*Address:* ${address}`;
            let whatsappNum = "923162260608";
            window.open(`https://wa.me/${whatsappNum}?text=${encodeURIComponent(msg)}`, '_blank');
            closeForm();
        }

        window.onload = loadProducts;
    </script>
</body>
</html>
